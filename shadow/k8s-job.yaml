# Smoke-test Job: run the Shadow prototype inside the lab k8s cluster.
#
# Apply with:
#   kubectl apply -f shadow/k8s-job.yaml
#
# Tail logs:
#   kubectl -n zerotesting-shadow logs -f job/shadow-smoke
#
# Clean up:
#   kubectl -n zerotesting-shadow delete job shadow-smoke
#
# Why these settings:
# - nodeSelector pins to node-05 (worker, biggest spec tier, not the control plane).
# - seccompProfile: Unconfined + SYS_PTRACE — Shadow uses ptrace/seccomp-bpf
#   for syscall interposition; the default container security profile blocks both.
# - 4 CPU / 8Gi is sized for the default 100-node smoke run; bump for bigger sims.
apiVersion: batch/v1
kind: Job
metadata:
  name: shadow-smoke
  namespace: zerotesting-shadow
spec:
  # Don't retry on failure — we want to see what broke.
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: shadow-smoke
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: node-05.ih-eu-mda1.misc.vaclab
      containers:
        - name: shadow
          image: radiken/dst-shadow-nim:latest
          imagePullPolicy: Always
          # Override CMD here if you want a different scale for this run.
          # Default in the image is: 1 100 15000 1 5 50 150 40 130 5 0.0 4 0 4000
          # args: ["1", "100", "15000", "1", "5", "50", "150", "40", "130", "5", "0.0", "4", "0", "4000"]
          securityContext:
            seccompProfile:
              type: Unconfined
            capabilities:
              add: ["SYS_PTRACE"]
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
