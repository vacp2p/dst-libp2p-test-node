apiVersion: v1
kind: Namespace
metadata:
  name: libp2p-lab
---
apiVersion: v1
kind: Service
metadata:
  name: nimp2p-service
  namespace: libp2p-lab
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: nim-quic
  ports:
    - name: quic
      port: 5000
      targetPort: 5000
      protocol: UDP
    - name: metrics
      port: 8008
      targetPort: 8008
      protocol: TCP
    - name: publish
      port: 8645
      targetPort: 8645
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nim-quic
  namespace: libp2p-lab
spec:
  serviceName: nimp2p-service
  replicas: 100
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: nim-quic
  template:
    metadata:
      labels:
        app: nim-quic
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: nim-libp2p-test
          image: mamoutoudiarra/nim-libp2p-test:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PEERS
              value: "100"
            - name: CONNECTTO
              value: "10"
            - name: MUXER
              value: "quic"
            - name: FRAGMENTS
              value: "1"
            - name: SHADOWENV
              value: "false"
            - name: SELFTRIGGER
              value: "false"
            - name: SERVICE
              value: "nimp2p-service"
            - name: MAXCONNECTIONS
              value: "128"
          ports:
            - name: quic
              containerPort: 5000
              protocol: UDP
            - name: metrics
              containerPort: 8008
              protocol: TCP
            - name: publish
              containerPort: 8645
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 8645
            initialDelaySeconds: 75
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8645
            initialDelaySeconds: 90
            periodSeconds: 10
