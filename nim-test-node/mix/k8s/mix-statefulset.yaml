# Deploy a shared Mix test network.
#
# Before applying:
# - Build and push the image, then set `spec.template.spec.containers[].image`.
# - Set `spec.replicas`, `NUMMIX`, and `PEERS` to the same value.
# - Set `CONNECTTO` lower than the replica count.
# - Set `storageClassName` to a ReadWriteMany-capable class in your cluster.
apiVersion: v1
kind: Namespace
metadata:
  name: mix
  labels:
    app.kubernetes.io/name: mix-test-node
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mix-pubinfos
  namespace: mix
  labels:
    app.kubernetes.io/name: mix-test-node
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mix
  namespace: mix
  labels:
    app.kubernetes.io/name: mix-test-node
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: mix-test-node
  ports:
    - name: libp2p
      port: 5000
      targetPort: libp2p
    - name: metrics
      port: 8008
      targetPort: metrics
---
apiVersion: v1
kind: Service
metadata:
  name: mix-metrics
  namespace: mix
  labels:
    app.kubernetes.io/name: mix-test-node
spec:
  selector:
    app.kubernetes.io/name: mix-test-node
  ports:
    - name: metrics
      port: 8008
      targetPort: metrics
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mix
  namespace: mix
  labels:
    app.kubernetes.io/name: mix-test-node
spec:
  serviceName: mix
  replicas: 10
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: mix-test-node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mix-test-node
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mix
          image: soutullostatus/public-mix:03d9139
          imagePullPolicy: Always
          ports:
            - name: libp2p
              containerPort: 5000
            - name: metrics
              containerPort: 8008
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: PUBLISHED_HOSTNAME
              value: "$(HOST_IP)"
            - name: PUBLISHED_PORT_BASE
              value: "31400"
            - name: SERVICE
              value: mix
            - name: FILEPATH
              value: /data
            - name: PEERS
              value: "10"
            - name: NUMMIX
              value: "10"
            - name: CONNECTTO
              value: "8"
            - name: STARTSLEEP
              value: "90"
            - name: MUXER
              value: yamux
            - name: MAXCONNECTIONS
              value: "250"
            - name: MIXPING
              value: "false"
          volumeMounts:
            - name: pubinfos
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: pubinfos
          persistentVolumeClaim:
            claimName: mix-pubinfos
