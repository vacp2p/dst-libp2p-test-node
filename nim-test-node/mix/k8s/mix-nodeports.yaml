# Optional external exposure for Mix pods.
#
# This exposes each StatefulSet pod through its own fixed NodePort:
# - mix-0  -> <node-external-ip-or-dns>:31400
# - mix-1  -> <node-external-ip-or-dns>:31401
# - ...
# - mix-19 -> <node-external-ip-or-dns>:31419
#
# These Services assume the StatefulSet is named `mix`.
# Kubernetes adds the `statefulset.kubernetes.io/pod-name` label to StatefulSet pods.
apiVersion: v1
kind: Namespace
metadata:
  name: mix
  labels:
    app.kubernetes.io/name: mix-test-node
---
apiVersion: v1
kind: Service
metadata:
  name: mix-0-external
  namespace: mix
  labels:
    app.kubernetes.io/name: mix-test-node
spec:
  type: NodePort
  externalTrafficPolicy: Local
  selector:
    statefulset.kubernetes.io/pod-name: mix-0
  ports:
    - name: libp2p
      port: 5000
      targetPort: libp2p
      nodePort: 31400
---
